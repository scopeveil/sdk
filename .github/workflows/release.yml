name: release

# Publishes the @scopeveil/sdk package to npm when a `v*` tag is pushed
# (e.g. `v0.2.2`, `v1.0.0`, `v0.3.0-beta.1`).
#
# To cut a release:
#   git tag v0.2.2 -m "release notes here"
#   git push origin v0.2.2
#
# The package.json version MUST match the tag. `npm publish` fails if
# the version already exists in the registry.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-sdk
  cancel-in-progress: false

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Permissions required by `npm publish --provenance`. Provenance is
    # a SLSA attestation saying "this tarball was produced by this commit
    # in this workflow run" — npm stores it and exposes it publicly.
    # Requires an OIDC token, hence id-token: write.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # npm workspaces: the root lockfile covers all sub-packages.
      # Everything below runs from the root, using `-w @scopeveil/sdk` to
      # target the package. Only the publish step needs cwd inside it.
      - name: install
        run: npm ci --no-audit --no-fund

      - name: test (privacy guards)
        run: npm test -w @scopeveil/sdk

      - name: build
        run: npm run build -w @scopeveil/sdk

      - name: publish
        working-directory: packages/typescript
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
